<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学语文 · 默写练习</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #f7f3ec;
    --ink: #1f1b16;
    --vermillion: #a8402f;
    --vermillion-light: #e8c9c2;
    --gold: #9a7b3f;
    --muted: #8a7d6c;
    --border: #ddd2bf;
    --card: #fffdf9;
    --correct: #2d5a3d;
    --correct-bg: #dceee0;
    --wrong: #a8402f;
    --wrong-bg: #f7e3df;
    --serif: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 48px 20px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 3px;
    background: var(--vermillion);
  }
  header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  header p {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 6px 16px;
    font-family: var(--serif);
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--vermillion); color: var(--vermillion); }
  .nav-btn.active { background: var(--vermillion); border-color: var(--vermillion); color: white; }

  main { max-width: 820px; margin: 0 auto; padding: 36px 20px 80px; }

  .control-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px dashed var(--border);
  }
  .control-label {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-right: 4px;
  }
  .difficulty-btn {
    padding: 5px 14px;
    font-family: var(--serif);
    font-size: 0.78rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
  }
  .difficulty-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(154,123,63,0.08); }

  .btn {
    padding: 9px 24px;
    font-family: var(--serif);
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--vermillion); color: white; }
  .btn-primary:hover { background: #8e3527; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

  .passage-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 36px 40px;
    margin-bottom: 24px;
  }
  .passage-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--vermillion);
    margin-bottom: 4px;
  }
  .passage-meta {
    font-size: 0.74rem;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }
  .passage-text {
    font-size: 1.08rem;
    line-height: 2.6;
    text-align: justify;
  }

  .blank-input {
    display: inline-block;
    width: 1.6em;
    text-align: center;
    border: none;
    border-bottom: 2px solid var(--gold);
    background: rgba(154,123,63,0.06);
    font-family: var(--serif);
    font-size: 1.05rem;
    color: var(--ink);
    padding: 1px 0;
    margin: 0 1px;
    outline: none;
  }
  .blank-input:focus { border-bottom-color: var(--vermillion); background: rgba(168,64,47,0.08); }
  .blank-input.correct { border-bottom-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
  .blank-input.wrong { border-bottom-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }

  .wrong-answer-tag {
    font-size: 0.7rem;
    color: var(--wrong);
    vertical-align: super;
    margin-left: 1px;
  }

  .action-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .result-panel {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 36px;
    text-align: center;
    display: none;
  }
  .result-panel.show { display: block; }
  .result-score {
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--vermillion);
    margin-bottom: 6px;
  }
  .result-label {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  footer {
    text-align: center;
    padding: 28px;
    font-size: 0.7rem;
    color: var(--border);
    letter-spacing: 0.08em;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <h1>大学语文 · 背诵默写</h1>
  <p>随机挖空练习</p>
</header>

<nav id="passage-nav"></nav>

<main>
  <div class="control-bar">
    <span class="control-label">挖空难度</span>
    <button class="difficulty-btn" data-level="0.2" onclick="setDifficulty(0.2, this)">简单 20%</button>
    <button class="difficulty-btn active" data-level="0.4" onclick="setDifficulty(0.4, this)">适中 40%</button>
    <button class="difficulty-btn" data-level="0.6" onclick="setDifficulty(0.6, this)">困难 60%</button>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary" id="start-btn">开始默写</button>
    <button class="btn btn-secondary" id="check-btn" style="display:none;">检查答案</button>
    <button class="btn btn-secondary" id="reveal-btn" style="display:none;">显示全文</button>
  </div>

  <div id="passage-container"></div>
  <div class="result-panel" id="result-panel"></div>
</main>

<footer>仅供个人复习使用</footer>

<script>
const passages = [
  {
    id: 0,
    title: "清华大学王观堂先生纪念碑铭（节选）",
    meta: "自「其词曰」始，到文章结束",
    segments: [
      "其词曰：", "士之读书治学，", "盖将以脱心志于俗谛之桎梏，", "真理因得以发扬。",
      "思想而不自由，", "毋宁死耳。", "斯古今仁圣所同殉之精义，", "夫岂庸鄙之敢望。",
      "先生以一死见其独立自由之意志，", "非所论于一人之恩怨，", "一姓之兴亡。",
      "呜呼！", "树兹石于讲舍，", "系哀思而不忘。", "表哲人之奇节，", "诉真宰之茫茫。",
      "来世不可知者也。", "先生之著述，", "或有时而不章。", "先生之学说，", "或有时而可商。",
      "惟此独立之精神，", "自由之思想，", "历千万祀，", "与天壤而同久，", "共三光而永光。"
    ]
  },
  {
    id: 1,
    title: "兰亭集序",
    meta: "王羲之",
    segments: [
      "永和九年，", "岁在癸丑。", "暮春之初，", "会于会稽山阴之兰亭，", "修禊事也。",
      "群贤毕至，", "少长咸集。", "此地有崇山峻岭，", "茂林修竹，", "又有清流激湍，",
      "映带左右，", "引以为流觞曲水，", "列坐其次。", "虽无丝竹管弦之盛，", "一觞一咏，",
      "亦足以畅叙幽情。", "是日也，", "天朗气清，", "惠风和畅，", "仰观宇宙之大，",
      "俯察品类之盛，", "所以游目骋怀，", "足以极视听之娱，", "信可乐也！",
      "夫人之相与，", "俯仰一世。", "或取诸怀抱，", "悟言一室之内，", "或因寄所托，",
      "放浪形骸之外。", "虽趣舍万殊，", "静躁不同，", "当其欣于所遇，", "暂得于己，",
      "快然自足，", "不知老之将至；", "及其所之既倦，", "情随事迁，", "感慨系之矣。",
      "向之所欣，", "俯仰之间，", "已为陈迹，", "犹不能不以之兴怀。", "况修短随化，",
      "终期于尽？", "古人云：「死生亦大矣！」", "岂不痛哉！", "每览昔人兴感之由，",
      "若合一契，", "未尝不临文嗟悼，", "不能喻之于怀。", "固知一死生为虚诞，",
      "齐彭殇为妄作。", "后之视今，", "亦犹今之视昔。", "悲夫！", "故列叙时人，",
      "录其所述，", "虽世殊事异，", "所以兴怀，", "其致一也。", "后之览者，", "亦将有感于斯文。"
    ]
  },
  {
    id: 2,
    title: "楚辞·渔父",
    meta: "屈原",
    segments: [
      "屈原既放，", "游于江潭，", "行吟泽畔，", "颜色憔悴，", "形容枯槁。",
      "渔父见而问之曰：「子非三闾大夫与？", "何故至于斯？」", "屈原曰：「举世皆浊我独清，",
      "众人皆醉我独醒，", "是以见放。」", "渔父曰：「圣人不凝滞于物，", "而能与世推移。",
      "世人皆浊，", "何不淈其泥而扬其波？", "众人皆醉，", "何不餔其糟而歠其醨？",
      "何故深思高举，", "自令放为？」", "屈原曰：「吾闻之，", "新沐者必弹冠，",
      "新浴者必振衣。", "安能以身之察察，", "受物之汶汶者乎？", "宁赴湘流，",
      "葬于江鱼之腹中，", "安能以皓皓之白，", "而蒙世俗之尘埃乎？」", "渔父莞尔而笑，",
      "鼓枻而去。", "歌曰：「沧浪之水清兮，", "可以濯吾缨；", "沧浪之水浊兮，",
      "可以濯吾足。」", "遂去，", "不复与言。"
    ]
  },
  {
    id: 3,
    title: "别赋（第1、2自然段）",
    meta: "江淹",
    segments: [
      "黯然销魂者，", "唯别而已矣！", "况秦吴兮绝国，", "复燕宋兮千里。",
      "或春苔兮始生，", "乍秋风兮暂起。", "是以行子肠断，", "百感凄恻。",
      "风萧萧而异响，", "云漫漫而奇色。", "舟凝滞于水滨，", "车逶迟于山侧。",
      "棹容与而讵前，", "马寒鸣而不息。", "掩金觞而谁御，", "横玉柱而沾轼。",
      "居人愁卧，", "怳若有亡。", "日下壁而沉彩，", "月上轩而飞光。",
      "见红兰之受露，", "望青楸之离霜。", "巡层楹而空掩，", "抚锦幕而虚凉。",
      "知离梦之踯躅，", "意别魂之飞扬。", "乃有剑客惭恩，", "少年报士。",
      "韩国赵厕，", "吴宫燕市。", "割慈忍爱，", "离邦去里。", "沥泣共诀，",
      "抆血相视。", "驱征马而不顾，", "见行尘之时起。", "方衔感于一剑，",
      "非买价于泉里。", "金石震而色变，", "骨肉悲而心死。"
    ]
  },
  {
    id: 4,
    title: "与元九书（节选）",
    meta: "白居易，「夫文尚矣」至「言者闻之莫不两尽其心焉」",
    segments: [
      "夫文尚矣！", "三才各有文。", "天之文三光首之；", "地之文五材首之；",
      "人之文六经首之。", "就六经言，", "《诗》又首之。", "何者？",
      "圣人感人心而天下和平。", "感人心者，", "莫先乎情，", "莫始乎言，",
      "莫切乎声，", "莫深乎义。", "诗者，", "根情，", "苗言，", "华声，",
      "实义。", "上自圣贤，", "下至愚騃，", "微及豚鱼，", "幽及鬼神。",
      "群分而气同，", "形异而情一。", "未有声入而不应，", "情交而不感者。",
      "圣人知其然，", "因其言，", "经之以六义；", "缘其声，", "纬之以五音。",
      "音有韵，", "义有类。", "韵协则言顺，", "言顺则声易入；", "类举则情见，",
      "情见则感易交。", "于是乎孕大含深，", "贯微洞密。", "上下通而一气泰，",
      "忧乐合而百志熙。", "五帝三皇所以直道而行，", "垂拱而理者，",
      "揭此以为大柄，", "决此以为大窦也。", "故闻「元首明，股肱良」之歌，",
      "则知虞道昌焉。", "闻五子洛汭之歌，", "则知夏政荒焉。", "言者无罪，",
      "闻者足戒。", "言者闻之莫不两尽其心焉。"
    ]
  },
  {
    id: 5,
    title: "古诗十九首·西北有高楼",
    meta: "佚名",
    segments: [
      "西北有高楼，", "上与浮云齐。", "交疏结绮窗，", "阿阁三重阶。",
      "上有弦歌声，", "音响一何悲！", "谁能为此曲？", "无乃杞梁妻。",
      "清商随风发，", "中曲正徘徊。", "一弹再三叹，", "慷慨有馀哀。",
      "不惜歌者苦，", "但伤知音稀。", "愿为双鸿鹄，", "奋翅起高飞。"
    ]
  },
  {
    id: 6,
    title: "长恨歌（开头节选）",
    meta: "白居易，开头至「千乘万骑西南行」",
    segments: [
      "汉皇重色思倾国，", "御宇多年求不得。", "杨家有女初长成，", "养在深闺人未识。",
      "天生丽质难自弃，", "一朝选在君王侧。", "回眸一笑百媚生，", "六宫粉黛无颜色。",
      "春寒赐浴华清池，", "温泉水滑洗凝脂。", "侍儿扶起娇无力，", "始是新承恩泽时。",
      "云鬓花颜金步摇，", "芙蓉帐暖度春宵。", "春宵苦短日高起，", "从此君王不早朝。",
      "承欢侍宴无闲暇，", "春从春游夜专夜。", "后宫佳丽三千人，", "三千宠爱在一身。",
      "金屋妆成娇侍夜，", "玉楼宴罢醉和春。", "姊妹弟兄皆列土，", "可怜光彩生门户。",
      "遂令天下父母心，", "不重生男重生女。", "骊宫高处入青云，", "仙乐风飘处处闻。",
      "缓歌慢舞凝丝竹，", "尽日君王看不足。", "渔阳鼙鼓动地来，", "惊破霓裳羽衣曲。",
      "九重城阙烟尘生，", "千乘万骑西南行。"
    ]
  },
  {
    id: 7,
    title: "临江仙·夜归临皋",
    meta: "苏轼",
    segments: [
      "夜饮东坡醒复醉，", "归来仿佛三更。", "家童鼻息已雷鸣。", "敲门都不应，",
      "倚杖听江声。", "长恨此身非我有，", "何时忘却营营？", "夜阑风静縠纹平。",
      "小舟从此逝，", "江海寄余生。"
    ]
  }
];

let currentPassageIndex = 0;
let difficulty = 0.4;
let blanksData = []; // {char, index}
let checked = false;

function renderNav() {
  const nav = document.getElementById('passage-nav');
  nav.innerHTML = passages.map((p, i) =>
    `<button class="nav-btn ${i===0?'active':''}" data-idx="${i}">${i+1}. ${p.title.length > 10 ? p.title.slice(0,10)+'…' : p.title}</button>`
  ).join('');
  nav.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPassageIndex = parseInt(btn.dataset.idx);
      nav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      resetView();
    });
  });
}

function setDifficulty(level, btn) {
  difficulty = level;
  document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function resetView() {
  document.getElementById('passage-container').innerHTML = '';
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('start-btn').style.display = 'inline-block';
  checked = false;
}

function getPunctuationSet() {
  return new Set(['，','。','、','；','：','！','？','「','」','《','》','—','…',' ']);
}

function startPractice() {
  const passage = passages[currentPassageIndex];
  const segments = passage.segments;

  const blankCount = Math.max(1, Math.floor(segments.length * difficulty));
  const shuffledIdx = segments.map((_, i) => i).sort(() => Math.random() - 0.5);
  const blankSet = new Set(shuffledIdx.slice(0, blankCount));

  blanksData = [];

  const container = document.getElementById('passage-container');
  let html = `
    <div class="passage-card">
      <div class="passage-title">${passage.title}</div>
      <div class="passage-meta">${passage.meta}</div>
      <div class="passage-text" id="passage-text">`;

  segments.forEach((seg, i) => {
    if (blankSet.has(i)) {
      const blankId = `blank-${blanksData.length}`;
      // 去掉句末标点，标点单独显示在输入框外
      const punctMatch = seg.match(/([，。；？！」》、]+)$/);
      const punct = punctMatch ? punctMatch[1] : '';
      const core = punctMatch ? seg.slice(0, -punct.length) : seg;
      const charLen = core.length;

      blanksData.push({ answer: core, index: i, id: blankId });
      html += `<input type="text" class="blank-input segment-blank" id="${blankId}" data-answer="${core}" autocomplete="off" placeholder="${'　'.repeat(Math.min(charLen, 12))}" style="width:${charLen * 1.15}em;">${punct}`;
    } else {
      html += seg;
    }
  });

  html += `</div></div>`;
  container.innerHTML = html;

  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('check-btn').style.display = 'inline-block';
  document.getElementById('reveal-btn').style.display = 'inline-block';
  document.getElementById('result-panel').classList.remove('show');
  checked = false;

  const inputs = container.querySelectorAll('.blank-input');
  if (inputs.length > 0) inputs[0].focus();

  // Tab/Enter 跳到下一个空
  inputs.forEach((input, idx) => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && idx < inputs.length - 1) {
        e.preventDefault();
        inputs[idx + 1].focus();
      }
    });
  });
}

function checkAnswers() {
  if (checked) return;
  checked = true;
  let correctCount = 0;

  blanksData.forEach(b => {
    const input = document.getElementById(b.id);
    const userVal = input.value.trim();
    const isCorrect = userVal === b.answer;
    input.disabled = true;
    if (isCorrect) {
      input.classList.add('correct');
      correctCount++;
    } else {
      input.classList.add('wrong');
      input.value = userVal || '○';
      const tag = document.createElement('span');
      tag.className = 'wrong-answer-tag';
      tag.textContent = `(${b.answer})`;
      input.insertAdjacentElement('afterend', tag);
    }
  });

  showResult(correctCount, blanksData.length);
}

function revealAll() {
  blanksData.forEach(b => {
    const input = document.getElementById(b.id);
    if (!input.disabled) {
      input.value = b.answer;
      input.disabled = true;
      input.classList.add('correct');
    }
  });
  if (!checked) {
    checked = true;
    showResult(blanksData.length, blanksData.length, true);
  }
}

function showResult(correct, total, revealed) {
  const panel = document.getElementById('result-panel');
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  panel.innerHTML = `
    <div class="result-score">${correct} / ${total}</div>
    <div class="result-label">${revealed ? '已显示全文' : '正确率 ' + pct + '%'}</div>
    <button class="btn btn-primary" id="retry-btn">再练一次</button>
  `;
  panel.classList.add('show');
  document.getElementById('retry-btn').addEventListener('click', () => {
    resetView();
  });
}

document.getElementById('start-btn').addEventListener('click', startPractice);
document.getElementById('check-btn').addEventListener('click', checkAnswers);
document.getElementById('reveal-btn').addEventListener('click', revealAll);

renderNav();
</script>
</body>
</html>
